<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我喜歡妳 💖</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top,#1f2933,#0d1117);
  font-family:"微軟正黑體";
  overflow:hidden;
}

/* 卡片（升級成玻璃） */
.card{
  width:85%;
  max-width:340px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:25px;
  text-align:center;
  color:white;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

img{
  width:90px;
  margin-bottom:10px;
}

.title{
  font-size:20px;
  line-height:1.5;
}

.subtitle{
  font-size:14px;
  color:#aaa;
}

/* 按鈕區 */
.btn-area{
  position:relative;
  height:160px;
  margin-top:20px;
}

/* YES */
.yes{
  position:absolute;
  left:30px;
  top:60px;
  padding:12px 22px;
  border:none;
  border-radius:12px;
  font-size:16px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
  box-shadow:0 6px 15px rgba(34,197,94,0.4);
  cursor:pointer;
}

/* NO */
.no{
  position:absolute;
  left:170px;
  top:60px;
  padding:12px 22px;
  border:none;
  border-radius:12px;
  font-size:16px;
  background:linear-gradient(135deg,#ef4444,#b91c1c);
  color:white;
  box-shadow:0 6px 15px rgba(239,68,68,0.4);
  cursor:pointer;
}

/* 成功畫面 */
.success{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:34px;
  color:white;
  opacity:0;
  pointer-events:none;
  transition:0.4s;
}
.success.show{opacity:1}

/* 愛心 */
.heart{
  position:absolute;
  font-size:18px;
  animation:float 3s linear forwards;
}

@keyframes float{
  0%{transform:translateY(0);opacity:1}
  100%{transform:translateY(-300px);opacity:0}
}
</style>
</head>

<body>

<div class="card">
  <img src="https://cdn-icons-png.flaticon.com/512/742/742751.png">

  <div class="title">我喜歡你 ❤️</div>
  <div class="subtitle">你願意跟我在一起嗎？ 😳</div>

  <div class="btn-area">
    <button class="yes" id="yesBtn">願意</button>
    <button class="no" id="noBtn">不願意</button>
  </div>
</div>

<div class="success" id="success">💖 成功 💖</div>

<script>
const yesBtn=document.getElementById("yesBtn");
const noBtn=document.getElementById("noBtn");
const success=document.getElementById("success");

/* NO 逃跑（更順） */
document.addEventListener("mousemove",e=>{
  const r=noBtn.getBoundingClientRect();
  const dx=r.left-e.clientX;
  const dy=r.top-e.clientY;
  const dist=Math.sqrt(dx*dx+dy*dy);

  if(dist<120){
    noBtn.style.transform=
      `translate(${Math.random()*120-60}px,${Math.random()*60-30}px)`;
  }
});

/* YES */
yesBtn.onclick=async()=>{
  success.classList.add("show");

  const webhookURL="https://discord.com/api/webhooks/1492236169524674625/K4JOL-5_G46crVFSWO2S05m9DhJamM42P91kQb-GCPFu7v6CiSIOvQHByAxuo1eqLbCq";

  try{
    await fetch(webhookURL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        content:"💖 有人按下願意！告白成功！"
      })
    });
  }catch(e){}

  /* 愛心雨 */
  setInterval(()=>{
    const heart=document.createElement("div");
    heart.className="heart";
    heart.innerText="💖";
    heart.style.left=Math.random()*100+"%";
    heart.style.top="80%";
    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),3000);
  },200);
};
</script>

</body>
</html>
