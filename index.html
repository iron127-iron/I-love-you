<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我喜歡妳</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle, #1f2933, #0d1117);
  font-family: "微軟正黑體", Arial;
  overflow: hidden;
}

/* 主卡片（微升級） */
.card {
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  position: relative;
}

/* 圖片 */
img {
  width: 110px;
  margin-bottom: 15px;
  filter: drop-shadow(0 6px 10px rgba(0,0,0,0.4));
}

/* 文字 */
.title {
  font-size: 23px;
  text-align: center;
  line-height: 1.6;
  font-weight: 600;
}

.subtitle {
  font-size: 16px;
  color: #b0b0b0;
}

/* 按鈕區 */
.btn-area {
  position: relative;
  width: 300px;
  height: 200px;
  margin-top: 25px;
}

/* 按鈕（升級質感） */
button {
  padding: 12px 26px;
  border: none;
  border-radius: 14px;
  font-size: 18px;
  cursor: pointer;
  position: absolute;
  transition: 0.2s;
  box-shadow: 0 6px 15px rgba(0,0,0,0.25);
}

/* YES */
.yes {
  background: linear-gradient(135deg,#22c55e,#16a34a);
  color: white;
}

/* NO */
.no {
  background: linear-gradient(135deg,#ef4444,#b91c1c);
  color: white;
}

/* 成功畫面（更乾淨） */
.success {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(10px);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: 0.5s;
}

.success.show {
  opacity: 1;
}

.success h1 {
  font-size: 42px;
  color: white;
  animation: pop 0.4s ease;
}

@keyframes pop {
  0% { transform: scale(0); }
  100% { transform: scale(1); }
}

/* 愛心 */
.heart {
  position: absolute;
  font-size: 20px;
  animation: float 3s linear forwards;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-300px); opacity: 0; }
}
</style>
</head>

<body>

<div class="card">
  <img src="https://cdn-icons-png.flaticon.com/512/742/742751.png">

  <p class="title">
    我喜歡你 ❤️<br>
    <span class="subtitle">你願意跟我在一起嗎？ 😳</span>
  </p>

  <div class="btn-area" id="area">
    <button class="yes" id="yesBtn">願意</button>
    <button class="no" id="noBtn">不願意</button>
  </div>
</div>

<div class="success" id="success">
  <h1>我愛你 ❤️</h1>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const area = document.getElementById("area");
const success = document.getElementById("success");

/* 初始位置 */
yesBtn.style.left = "40px";
yesBtn.style.top = "100px";

noBtn.style.left = "160px";
noBtn.style.top = "100px";

/* NO 逃跑（更滑） */
function moveAway(x, y) {
  const rect = noBtn.getBoundingClientRect();
  const bx = rect.left + rect.width/2;
  const by = rect.top + rect.height/2;

  const dx = bx - x;
  const dy = by - y;
  const dist = Math.sqrt(dx*dx + dy*dy);

  if (dist < 120) {
    noBtn.style.left = Math.random() * 200 + "px";
    noBtn.style.top = Math.random() * 150 + "px";
  }
}

document.addEventListener("mousemove", e => moveAway(e.clientX, e.clientY));
document.addEventListener("touchmove", e => moveAway(e.touches[0].clientX, e.touches[0].clientY));

/* YES */
yesBtn.onclick = async () => {
  success.classList.add("show");

  const webhookURL = "https://discord.com/api/webhooks/1492236169524674625/K4JOL-5_G46crVFSWO2S05m9DhJamM42P91kQb-GCPFu7v6CiSIOvQHByAxuo1eqLbCq";

  const embed = {
    username: "💌 告白系統",
    avatar_url: "https://cdn-icons-png.flaticon.com/512/742/742751.png",
    embeds: [
      {
        title: "💖 告白成功",
        description: "有人按下『願意』 ❤️",
        color: 0xff4d6d,
        thumbnail: {
          url: "https://cdn-icons-png.flaticon.com/512/742/742751.png"
        },
        fields: [
          { name: "💘 結果", value: "成功", inline: true },
          { name: "💞 狀態", value: "戀愛模式", inline: true }
        ],
        footer: {
          text: "Love System"
        },
        timestamp: new Date().toISOString()
      }
    ]
  };

  try {
    await fetch(webhookURL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(embed)
    });
  } catch (e) {}

  /* 愛心 */
  setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerText = "💖";
    heart.style.left = Math.random() * 100 + "%";
    heart.style.top = "80%";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 3000);
  }, 200);
};
</script>

</body>
</html>
