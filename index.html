<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>我喜歡妳</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #0d1117;
  font-family: "微軟正黑體", Arial;
  overflow: hidden;
}

/* 主畫面 */
.card {
  width: 100%;
  height: 100vh;
  background: #1f2933;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  position: relative;
}

img {
  width: 100px;
  margin-bottom: 15px;
}

.title {
  font-size: 22px;
  line-height: 1.6;
  text-align: center;
}

.subtitle {
  font-size: 16px;
  color: #aaa;
}

.btn-area {
  position: relative;
  width: 300px;
  height: 200px;
  margin-top: 20px;
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  cursor: pointer;
  position: absolute;
  transition: 0.2s;
}

.yes {
  background: #4CAF50;
  color: white;
}

.no {
  background: #ff4d4d;
  color: white;
}

/* 💖 成功畫面 */
.success {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #ff4d6d, #0d1117);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: 0.5s;
}

.success.show {
  opacity: 1;
  pointer-events: all;
}

.success h1 {
  font-size: 40px;
  color: white;
  animation: pop 0.5s ease;
}

/* 💕 愛心動畫 */
.heart {
  position: absolute;
  font-size: 20px;
  animation: float 3s linear infinite;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-300px); opacity: 0; }
}

@keyframes pop {
  0% { transform: scale(0); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>

<div class="card">
  <img src="https://cdn-icons-png.flaticon.com/512/742/742751.png">

  <p class="title">
    我喜歡你 ❤️<br>
    <span class="subtitle">你願意跟我在一起嗎？ 😳</span>
  </p>

  <div class="btn-area" id="area">
    <button class="yes" id="yesBtn">願意</button>
    <button class="no" id="noBtn">不願意</button>
  </div>
</div>

<!-- 💖 成功畫面 -->
<div class="success" id="success">
  <h1>我愛你 ❤️</h1>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const area = document.getElementById("area");
const success = document.getElementById("success");

let noScale = 1;
let yesScale = 1;

// 初始位置
yesBtn.style.left = "40px";
yesBtn.style.top = "100px";

noBtn.style.left = "160px";
noBtn.style.top = "100px";

// 😈 逃跑
function moveAway(x, y) {
  const rect = noBtn.getBoundingClientRect();
  const btnX = rect.left + rect.width / 2;
  const btnY = rect.top + rect.height / 2;

  const dx = btnX - x;
  const dy = btnY - y;
  const distance = Math.sqrt(dx * dx + dy * dy);

  if (distance < 120) {
    const maxX = area.clientWidth - noBtn.offsetWidth;
    const maxY = area.clientHeight - noBtn.offsetHeight;

    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";

    noScale -= 0.1;
    if (noScale < 0.3) noScale = 0.3;
    noBtn.style.transform = `scale(${noScale})`;

    yesScale += 0.1;
    yesBtn.style.transform = `scale(${yesScale})`;
  }
}

// 滑鼠 / 觸控
document.addEventListener("mousemove", e => moveAway(e.clientX, e.clientY));
document.addEventListener("touchmove", e => {
  moveAway(e.touches[0].clientX, e.touches[0].clientY);
});

// 💖 點 YES
yesBtn.onclick = () => {
  success.classList.add("show");

  // 愛心生成
  setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerText = "💖";
    heart.style.left = Math.random() * 100 + "%";
    heart.style.top = "80%";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 3000);
  }, 200);
};
</script>

</body>
</html>
